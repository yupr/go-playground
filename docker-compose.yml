services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    # APIコンテナが起動する前に、dbコンテナを先に起動させる指示
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      # MySQLの初期設定（データベース名、ユーザー名、パスワード）
      MYSQL_DATABASE: playground_db
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      # データを永続化するための設定
      - db-data:/var/lib/mysql

# データベース用の永続ボリュームを定義
volumes:
  db-data:
